# Server
spring.application.name=momentum-backend
server.port=${PORT:8080}

# H2 Database (file-based so data persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/momentumdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=momentum
spring.datasource.password=secret
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (change in production)
app.jwt.secret=MomentumGhibliSecretKey2026SuperLongStringForHMACSHA256
app.jwt.expiration-ms=86400000

# CORS - allow Vercel frontend
app.cors.allowed-origins=https://momentum-focus-app.vercel.app

# Logging
logging.level.com.momentum=INFO
